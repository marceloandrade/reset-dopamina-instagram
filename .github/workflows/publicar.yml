name: Publicar calendário no Instagram

on:
  schedule:
    # 15:00 UTC = 12:00 horário de Brasília (UTC-3) — horário de almoço,
    # intencional: é quando o público tende a estar com o celular na mão.
    - cron: "0 15 * * *"
  workflow_dispatch: {} # permite rodar manualmente pelo botão "Run workflow" no GitHub, útil pra testar

jobs:
  publicar:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar o repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Publicar posts aprovados de hoje
        env:
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATA_SOURCE_ID: ${{ secrets.NOTION_DATA_SOURCE_ID }}
        run: python publicar_calendario.py
